replicaCount: 1

image:
  repository: ghcr.io/timson/vihren
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: false
  name: ""

storage:
  size: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""

livenessProbe:
  enabled: true
  path: /api/v1/health_check
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  path: /api/v1/health_check
  initialDelaySeconds: 5
  periodSeconds: 10
